apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: shoppilot
  labels:
    app: shoppilot
    component: frontend
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shoppilot
      component: frontend
  template:
    metadata:
      labels:
        app: shoppilot
        component: frontend
        version: "1.0"
    spec:
      containers:
        - name: frontend
          image: shoppilot-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: shoppilot-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
