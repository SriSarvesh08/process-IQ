apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: shoppilot
  labels:
    app: shoppilot
    component: database
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shoppilot
      component: database
  template:
    metadata:
      labels:
        app: shoppilot
        component: database
        version: "1.0"
    spec:
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongodb-pvc
