apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: shoppilot
  labels:
    app: shoppilot
    component: backend
spec:
  type: NodePort # Using NodePort for easy local k3s testing
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30001
  selector:
    app: shoppilot
    component: backend
