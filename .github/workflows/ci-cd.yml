name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # If any stage fails, the entire workflow stops.
    steps:
      - name: Stage 1 - Checkout Repository
        uses: actions/checkout@v3

      - name: Stage 2 - Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Stage 3 - Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Stage 4 - Install Backend Dependencies
        working-directory: ./backend
        run: npm ci || npm install

      - name: Stage 5 - Run Backend Tests (if available)
        working-directory: ./backend
        run: npm test || echo "No tests defined"

      - name: Stage 6 - Run Frontend Build
        working-directory: ./frontend
        run: npm run build

      - name: Stage 7 - Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Stage 8 - Install Worker Dependencies
        working-directory: ./worker
        run: pip install -r requirements.txt

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Stage 9 & 10 - Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_REPOSITORY }}/frontend:latest
            ${{ secrets.DOCKER_REPOSITORY }}/frontend:${{ github.sha }}

      - name: Stage 9 & 10 - Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_REPOSITORY }}/backend:latest
            ${{ secrets.DOCKER_REPOSITORY }}/backend:${{ github.sha }}

      - name: Stage 9 & 10 - Build and Push Worker Image
        uses: docker/build-push-action@v4
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKER_REPOSITORY }}/worker:latest
            ${{ secrets.DOCKER_REPOSITORY }}/worker:${{ github.sha }}

      - name: Stage 11 - Update Kubernetes Deployment Image Tags
        run: |
          sed -i "s|image: .*frontend:latest|image: ${{ secrets.DOCKER_REPOSITORY }}/frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml
          sed -i "s|image: .*backend:latest|image: ${{ secrets.DOCKER_REPOSITORY }}/backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|image: .*worker:latest|image: ${{ secrets.DOCKER_REPOSITORY }}/worker:${{ github.sha }}|g" k8s/worker-deployment.yaml

      - name: Stage 12 - Commit Updated Manifests to Git Repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add k8s/frontend-deployment.yaml k8s/backend-deployment.yaml k8s/worker-deployment.yaml
          git commit -m "chore: update deployment image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Stage 13 - ArgoCD Synchronization Note
        run: echo "The latest image tags have been pushed to Git. ArgoCD will now automatically detect this commit and deploy the new images to the cluster!"
